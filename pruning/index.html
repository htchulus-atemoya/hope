<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>果園修剪作業紀錄</title>
    <style>
        /* =========================================
           全域重置與基礎設定
           ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Microsoft JhengHei", "PingFang TC", "Helvetica Neue", sans-serif;
            background: radial-gradient(circle at top center, #1b4332, #081c15);
            color: #e9ecef;
            min-height: 100vh;
            padding: 40px 20px;
            line-height: 1.6;
            position: relative;
        }

        /* =========================================
           返回按鈕樣式 (含屋子圖示) 
           ========================================= */
        .back-btn {
            position: absolute;
            top: 40px;
            left: 40px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 22px;
            /* 亮綠色漸層背景 */
            background: linear-gradient(135deg, #40916c, #52b788);
            border: none;
            border-radius: 30px;
            color: #ffffff; /* 純白高對比度 */
            text-decoration: none;
            font-size: 0.95em;
            font-weight: 600; /* 加粗字體 */
            /* cubic-bezier 讓放大動畫帶有微彈性 */
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            /* 預設綠色發光陰影 */
            box-shadow: 0 4px 15px rgba(82, 183, 136, 0.4);
            z-index: 10;
        }

        /* 返回按鈕滑鼠懸停特效 */
        .back-btn:hover {
            background: linear-gradient(135deg, #52b788, #74c69d); /* 顏色變更亮 */
            transform: translateY(-4px) scale(1.05); /* 整個按鈕上浮並放大 5% */
            box-shadow: 0 8px 25px rgba(82, 183, 136, 0.7); /* 陰影擴大、發光感更強 */
        }

        /* SVG 屋子圖示大小與顏色控制 */
        .back-btn svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        /* 滑鼠懸停時，屋子圖示產生上下跳動的小動畫 */
        .back-btn:hover svg {
            animation: bounceIcon 0.5s ease infinite alternate;
        }

        /* 定義屋子圖示跳躍的 keyframes */
        @keyframes bounceIcon {
            0% { transform: translateY(0); }
            100% { transform: translateY(-3px); }
        }

        /* =========================================
           標題區塊設計
           ========================================= */
        .header {
            text-align: center;
            margin-bottom: 60px;
            padding-top: 20px; 
        }

        .header h1 {
            font-size: 2.8em;
            color: #d8f3dc;
            margin-bottom: 15px;
            letter-spacing: 2px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .header p {
            font-size: 1.2em;
            color: #95d5b2;
            letter-spacing: 1px;
        }

        /* =========================================
           網格排版 (RWD)
           ========================================= */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* =========================================
           卡片容器與圖片特效
           ========================================= */
        .card {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            background: #111;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            cursor: pointer;
        }

        .card img {
            width: 100%;
            height: 350px;
            object-fit: cover;
            display: block;
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* 滑鼠懸停時圖片放大 */
        .card:hover img {
            transform: scale(1.08);
        }

        /* =========================================
           文字說明遮罩層
           ========================================= */
        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 40px 25px 25px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0.5) 60%, transparent 100%);
            transform: translateY(10px);
            transition: all 0.4s ease;
        }

        .overlay h3 {
            font-size: 1.3em;
            font-weight: 500;
            color: #ffffff;
            margin: 0;
            border-left: 4px solid #52b788;
            padding-left: 12px;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        /* 滑鼠懸停時文字層微升 */
        .card:hover .overlay {
            transform: translateY(0);
            background: linear-gradient(to top, rgba(0, 0, 0, 0.95) 0%, rgba(0, 0, 0, 0.7) 70%, transparent 100%);
        }

        /* =========================================
           RWD 行動裝置排版優化
           ========================================= */
        @media (max-width: 768px) {
            body {
                padding: 30px 20px;
            }
            .back-btn {
                position: static;
                margin: 0 auto 30px auto;
                display: flex;
                width: max-content;
            }
            .header {
                margin-bottom: 40px;
                padding-top: 0;
            }
            .header h1 { font-size: 2.2em; }
            .card img { height: 280px; }
            .overlay { transform: translateY(0); }
        }
    </style>
</head>
<body>

    <a href="../index.html" class="back-btn" title="返回全紀錄">
        <svg viewBox="0 0 24 24">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
        </svg>
        <span>返回全紀錄</span>
    </a>

    <header class="header">
        <h1>強剪與催芽</h1>
        <p>在清明節附近強剪,目的是為了萌出結果枝,塑型,降低病蟲害</p>
    </header>

    <main class="gallery">
        <div class="card">
            <img src="aa.jpg" alt="鏈鋸去除枯腐枝條">
            <div class="overlay">
                <h3>鏈鋸去除枯腐枝條</h3>
            </div>
        </div>

        <div class="card">
            <img src="bb.jpg" alt="保留主幹與部分亞主枝">
            <div class="overlay">
                <h3>保留主幹與部分亞主枝</h3>
            </div>
        </div>

        <div class="card">
            <img src="cc.jpg" alt="去除下垂枝">
            <div class="overlay">
                <h3>去除下垂枝</h3>
            </div>
        </div>

        <div class="card">
            <img src="dd.jpg" alt="去除徒長枝條">
            <div class="overlay">
                <h3>去除徒長枝條</h3>
            </div>
        </div>

        <div class="card">
            <img src="ee.jpg" alt="園區修剪完成">
            <div class="overlay">
                <h3>園區修剪完成</h3>
            </div>
        </div>

        <div class="card">
            <img src="ff.jpg" alt="90日後成長情況">
            <div class="overlay">
                <h3>90日後成長情況</h3>
            </div>
        </div>
    </main>

</body>
</html>
