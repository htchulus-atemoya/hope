<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柏涵鳳梨釋迦年度栽培紀實</title>
    <style>
        :root {
            --custard-green: #43a047;
            --pulp-white: #f9fbe7;
            --seed-black: #212121;
        }

        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* 背景圖：請確保檔名正確 */
            background: url('IMG_20171120_104043.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            overflow-x: hidden;
        }

        .overlay {
            background: radial-gradient(circle, rgba(255,255,255,0.2) 0%, rgba(0,0,0,0.5) 100%);
            width: 100%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            backdrop-filter: blur(2px) brightness(1.1);
        }

        h1 {
            color: white;
            text-shadow: 0 4px 8px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            font-size: 2.2rem;
            letter-spacing: 2px;
            background: rgba(67, 160, 71, 0.9);
            padding: 5px 35px 5px 20px; /* 調整左側邊距給花朵 */
            border-radius: 60px;
            border: 3px solid var(--pulp-white);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        /* 去背花朵圖示樣式 */
        .flower-icon {
            height: 70px; /* 配合標題高度 */
            width: auto;
            /* 讓透明圖片帶有立體陰影 */
            filter: drop-shadow(2px 4px 6px rgba(0,0,0,0.4));
            transition: transform 0.3s ease;
        }

        h1:hover .flower-icon {
            transform: scale(1.1) rotate(-5deg);
        }

        .links-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            perspective: 1000px;
        }

        .link-card {
            background: rgba(255, 255, 255, 0.9);
            padding: 25px;
            text-decoration: none;
            color: var(--custard-green);
            border-radius: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 5px solid #e0e0e0;
            position: relative;
            overflow: hidden;
        }

        .link-card:hover {
            transform: translateY(-10px) rotateX(5deg);
            background: var(--pulp-white);
            color: #2e7d32;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border-bottom: 5px solid var(--custard-green);
        }

        /* 裝飾：模擬釋迦種子 */
        .link-card::after {
            content: '';
            position: absolute;
            bottom: 8px;
            right: 12px;
            width: 12px;
            height: 15px;
            background: var(--seed-black);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0.15;
            transform: rotate(15deg);
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.4rem; padding: 5px 20px 5px 10px; }
            .flower-icon { height: 50px; }
        }
    </style>
</head>
<body>

<div class="overlay">
    <h1>
        <!-- 直接使用去背好的圖片 -->
        <img src="flower_icon.png" alt="釋迦花" class="flower-icon">
        柏涵鳳梨釋迦年度栽培紀實
    </h1>
    
    <div class="links-grid">
        <a href="https://www.youtube.com/@moa_taiwan" target="_blank" class="link-card">農業部官方頻道</a>
        <a href="https://www.youtube.com/@TARI_Taiwan" target="_blank" class="link-card">農業試驗所</a>
        <a href="https://www.youtube.com/@DAAITV_Farmer" target="_blank" class="link-card">農夫與他的田</a>
        <a href="https://www.youtube.com/@OurIsland" target="_blank" class="link-card">公視-我們的島</a>
        <a href="https://www.youtube.com/results?search_query=%E9%B3%B3%E6%A2%A8%E9%87%8B%E8%BF%A6%E6%A0%BD%E5%9F%B9" target="_blank" class="link-card">鳳梨釋迦栽培技術</a>
        <a href="https://www.youtube.com/@user-mv9pw2pt3v" target="_blank" class="link-card">台東區農業改良場</a>
        <a href="https://www.youtube.com/@vegetables_learning" target="_blank" class="link-card">簡單學種菜</a>
        <a href="https://www.youtube.com/@Super_Agri" target="_blank" class="link-card">農業新技術分享</a>
        <a href="https://www.youtube.com/@Agri-Talk" target="_blank" class="link-card">農民講堂</a>
        <a href="https://www.youtube.com/@FTV_Agri" target="_blank" class="link-card">民視農業節目</a>
    </div>
</div>

</body>
</html>
