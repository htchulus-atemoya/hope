<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柏涵鳳梨釋迦年度紀實</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft JhengHei", sans-serif;
        }

        body, html { height: 100%; }

        /* 背景圖片：恢復滿版不縮小 */
        .background {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('1632.WEBP');
            background-size: cover;         /* 滿版顯示 */
            background-repeat: no-repeat;
            background-position: center;
            background-color: #1a1a1a;
            z-index: -1;
            filter: brightness(0.7);        /* 稍微調暗以凸顯文字 */
        }

        /* 右上角地圖按鈕 */
        .map-tag {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
        }

        .map-link {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            background: rgba(0, 0, 0, 0.5); /* 加深背景確保可讀性 */
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 10px 18px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 1rem;
            transition: 0.3s;
        }

        .map-link svg {
            margin-right: 8px;
            fill: #ffeb3b;
            width: 24px;  /* 加大圖示 */
            height: 24px;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 60px 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.8);
        }

        header h1 {
            font-size: 2.5rem;
            border-bottom: 3px solid #b5d333;
            padding-bottom: 10px;
        }

        nav { width: 100%; max-width: 450px; }
        ul { list-style: none; }
        li { margin-bottom: 15px; }

        /* 按鈕：圖示在左，文字置中 */
        a.nav-btn {
            display: flex;
            align-items: center;      
            justify-content: center;
            text-decoration: none;
            color: #fff;
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            font-size: 1.2rem;
            font-weight: bold;
            transition: 0.3s;
            position: relative;        
            overflow: hidden;
        }

        /* 圖示基礎共同樣式 */
        .nav-icon {
            position: absolute;        
            left: 20px;
            width: 35px;               /* 預設基礎寬度 */
            height: auto;
            pointer-events: none;
            transition: 0.2s ease-in-out; /* 讓縮放與位置變化稍微平滑一點 */
        }

        /* 【修改】預設花朵（未 hover）：調得更精緻小巧 */
        .icon-default {
            width: 25px;               /* 花朵縮小 */
            left: 25px;                /* 補足置中位置 */
        }

        /* 預設隱藏 hover 後的 open 圖示 */
        .icon-hover {
            display: none;
        }

        /* 當滑鼠移到選單（a.nav-btn:hover）時的切換隱現邏輯 */
        a.nav-btn:hover .icon-default {
            display: none; /* 隱藏原本的 lower_icon */
        }

        /* 【修改】移到選單時（hover）：釋迦變大 */
        a.nav-btn:hover .icon-hover {
            display: block; /* 顯示開花後的 open */
            width: 45px;    /* 釋迦放大 */
            left: 15px;     /* 補足置中位置 */
        }

        a.nav-btn span {
            display: inline-block;
            text-align: center;
        }

        a.nav-btn:hover {
            background: rgba(181, 211, 51, 0.9);
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
        }

        footer {
            margin-top: auto;
            color: white;
            padding: 20px;
            font-size: 0.85rem;
            text-align: center;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }

        /* 手機版優化 */
        @media (max-width: 480px) {
            .background { background-size: cover; } 
            
            /* 加大手機版地圖連結尺寸 */
            .map-tag { top: 15px; right: 15px; }
            .map-link {
                padding: 12px 20px;
                font-size: 1.1rem;
                background: rgba(0, 0, 0, 0.6);
            }
            .map-link svg { width: 28px; height: 28px; }

            header h1 { font-size: 1.8rem; }
            a.nav-btn { font-size: 1.1rem; padding: 14px 20px; }
            
            /* 手機版圖示基礎設定 */
            .nav-icon { width: 30px; left: 15px; }

            /* 【修改】手機版花朵尺寸微調 */
            .icon-default {
                width: 20px;
                left: 20px;
            }

            /* 【修改】手機版釋迦放大微調 */
            a.nav-btn:hover .icon-hover {
                width: 38px;
                left: 11px;
            }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <!-- 右上角地圖（修正了多出來的 { 括號） -->
    <div class="map-tag">
        <a href="https://maps.app.goo.gl/2N2X4HgWPJJM6CYW7" target="_blank" class="map-link">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 -960 960 960"><path d="M480-480q33 0 56.5-23.5T560-560q0-33-23.5-56.5T480-640q-33 0-56.5 23.5T400-560q0 33 23.5 56.5T480-480Zm0 294q122-112 181-203.5T720-552q0-109-69.5-178.5T480-800q-101 0-170.5 69.5T240-552q0 71 59 162.5T480-186Zm0 106Q319-217 239.5-334.5T160-552q0-150 96.5-239T480-880q163 0 259.5 89T836-552q0 117-79.5 234.5T480-80Z"/></svg>
            斑鳩果園地圖
        </a>
    </div>

    <div class="container">
        <header>
            <h1>柏涵鳳梨釋迦年度紀實</h1>
        </header>

        <nav>
            <ul>
                <li><a href="補苗嫁接/" class="nav-btn"><img src="lower_icon.png" class="nav-icon icon-default"><img src="open.png" class="nav-icon icon-hover"><span>補苗嫁接</span></a></li>
                <li><a href="強剪與催芽期/" class="nav-btn"><img src="lower_icon.png" class="nav-icon icon-default"><img src="open.png" class="nav-icon icon-hover"><span>強剪與催芽期</span></a></li>
                <li><a href="施肥/" class="nav-btn"><img src="lower_icon.png" class="nav-icon icon-default"><img src="open.png" class="nav-icon icon-hover"><span>施肥</span></a></li>
                <li><a href="花期與人工授粉/" class="nav-btn"><img src="lower_icon.png" class="nav-icon icon-default"><img src="open.png" class="nav-icon icon-hover"><span>花期與人工授粉</span></a></li>
                <li><a href="果實發育與疏果/" class="nav-btn"><img src="lower_icon.png" class="nav-icon icon-default"><img src="open.png" class="nav-icon icon-hover"><span>果實發育與疏果</span></a></li>
                <li><a href="病蟲害防治與套袋/" class="nav-btn"><img src="lower_icon.png" class="nav-icon icon-default"><img src="open.png" class="nav-icon icon-hover"><span>病蟲害防治與套袋</span></a></li>
                <li><a href="採收與分級/" class="nav-btn"><img src="lower_icon.png" class="nav-icon icon-default"><img src="open.png" class="nav-icon icon-hover"><span>採收與分級</span></a></li>
            </ul>
        </nav>

        <footer>
            &copy; 2026 柏涵鳳梨釋迦紀錄
        </footer>
    </div>

</body>
</html>
